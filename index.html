<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>BizSpotter Pro | 의료 인프라 분석 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard', sans-serif; overflow: hidden; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 h-screen overflow-hidden flex flex-col">

    <header class="h-20 bg-white border-b flex items-center justify-between px-10 shrink-0 shadow-sm z-10">
        <h1 class="text-2xl font-bold text-indigo-600 italic flex items-center gap-2">
            <i data-lucide="shield-check"></i> BizSpotter Pro
        </h1>
        <div id="status" class="flex items-center gap-2 text-sm font-bold text-slate-400">
            <span class="w-2 h-2 bg-slate-300 rounded-full animate-pulse"></span> 데이터 로드 대기 중
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-6 md:p-10 bg-slate-50">
        <div class="max-w-6xl mx-auto space-y-8">
            
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                <h3 class="font-bold text-lg mb-6 flex items-center gap-2">
                    <i data-lucide="settings-2" size="20" class="text-indigo-500"></i> 분석 가중치 설정 (%)
                </h3>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6">
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">소아청소년과</label>
                        <input type="number" id="w_ped" value="40" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold focus:ring-2 ring-indigo-500 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">치과(의원/병원)</label>
                        <input type="number" id="w_den" value="20" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold focus:ring-2 ring-indigo-500 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">약국</label>
                        <input type="number" id="w_pha" value="20" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold focus:ring-2 ring-indigo-500 outline-none">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[11px] font-bold text-slate-400 uppercase tracking-wider">종합/상급병원</label>
                        <input type="number" id="w_hos" value="20" class="w-full p-4 bg-slate-50 border border-slate-100 rounded-2xl font-bold focus:ring-2 ring-indigo-500 outline-none">
                    </div>
                </div>
                <button onclick="updateAnalysis()" class="mt-8 w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-indigo-600 transition-all shadow-lg active:scale-[0.98]">
                    분석 결과 업데이트
                </button>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-5 bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm flex flex-col h-[500px]">
                    <h4 class="font-bold text-lg mb-6 flex items-center gap-2">
                        <i data-lucide="award" class="text-amber-500"></i> 의료 안심 입지 TOP 10
                    </h4>
                    <div id="rankList" class="space-y-4 overflow-y-auto flex-1 pr-2 custom-scroll">
                        </div>
                </div>

                <div class="lg:col-span-7 bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-sm h-[500px] flex flex-col">
                    <h4 class="font-bold text-lg mb-6 flex items-center gap-2">
                        <i data-lucide="bar-chart-3" class="text-indigo-500"></i> 지역별 지수 비교
                    </h4>
                    <div class="flex-1 relative">
                        <canvas id="scoreChart"></canvas>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script>
        lucide.createIcons();
        let masterData = [];
        let scoreChart;

        // JSON 데이터 자동 로드
        window.onload = async () => {
            const statusEl = document.getElementById('status');
            try {
                const response = await fetch('summary.json');
                if(!response.ok) throw new Error("JSON 파일을 찾을 수 없습니다.");
                const data = await response.json();
                
                masterData = Object.entries(data).map(([name, counts]) => ({ name, ...counts }));
                statusEl.innerHTML = '<span class="w-2 h-2 bg-green-500 rounded-full"></span> 데이터 동기화 완료';
                statusEl.className = "flex items-center gap-2 text-sm font-bold text-green-600";
                
                updateAnalysis();
            } catch (err) {
                statusEl.innerHTML = '<span class="w-2 h-2 bg-red-500 rounded-full"></span> JSON 로드 실패';
                statusEl.className = "flex items-center gap-2 text-sm font-bold text-red-600";
                console.error(err);
            }
        };

        function updateAnalysis() {
            if(masterData.length === 0) return;

            const wp = parseFloat(document.getElementById('w_ped').value) || 0;
            const wd = parseFloat(document.getElementById('w_den').value) || 0;
            const wph = parseFloat(document.getElementById('w_pha').value) || 0;
            const wh = parseFloat(document.getElementById('w_hos').value) || 0;
            const totalWeight = wp + wd + wph + wh;

            const maxs = {
                ped: Math.max(...masterData.map(d => d.ped)) || 1,
                den: Math.max(...masterData.map(d => d.den)) || 1,
                pha: Math.max(...masterData.map(d => d.pha)) || 1,
                hos: Math.max(...masterData.map(d => d.hos)) || 1
            };

            masterData.forEach(d => {
                const s_ped = (d.ped / maxs.ped) * 100;
                const s_den = (d.den / maxs.den) * 100;
                const s_pha = (d.pha / maxs.pha) * 100;
                const s_hos = (d.hos / maxs.hos) * 100;
                d.totalScore = (s_ped*wp + s_den*wd + s_pha*wph + s_hos*wh) / (totalWeight || 1);
            });

            masterData.sort((a, b) => b.totalScore - a.totalScore);
            renderUI();
        }

        function renderUI() {
            // 랭킹 리스트
            const listEl = document.getElementById('rankList');
            listEl.innerHTML = masterData.slice(0, 10).map((d, i) => `
                <div class="p-5 bg-slate-50 rounded-[1.5rem] border border-slate-100 flex justify-between items-center hover:border-indigo-300 transition-all cursor-default group">
                    <div>
                        <span class="text-[10px] font-black text-indigo-400 uppercase tracking-tighter">Rank ${i+1}</span>
                        <p class="font-bold text-slate-800">${d.name}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xl font-black text-indigo-600 group-hover:scale-110 transition-transform">${d.totalScore.toFixed(1)}</p>
                    </div>
                </div>
            `).join('');

            // 차트
            const ctx = document.getElementById('scoreChart').getContext('2d');
            if(scoreChart) scoreChart.destroy();
            
            const gradient = ctx.createLinearGradient(0, 0, 0, 400);
            gradient.addColorStop(0, '#6366f1');
            gradient.addColorStop(1, '#a855f7');

            scoreChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: masterData.slice(0, 10).map(d => d.name),
                    datasets: [{
                        label: '안심 지수',
                        data: masterData.slice(0, 10).map(d => d.totalScore),
                        backgroundColor: gradient,
                        borderRadius: 12,
                        barThickness: 30
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, max: 100, grid: { color: '#f1f5f9' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }
    </script>
</body>

</html>
