<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전국 의료 입지 분석 - 통합 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_CLIENT_ID&submodules=geocoding"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; background-color: #f3f4f6; color: #111827; }
        .card { background: white; border-radius: 1rem; border: 1px solid #e5e7eb; padding: 1.5rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .search-input { background: #1f2937; border: 1px solid #374151; color: white; padding: 0.5rem 1rem; border-radius: 0.5rem; font-size: 0.875rem; width: 200px; }
        #map { width: 100%; height: 350px; border-radius: 1rem; }
        .dept-badge { background: #dbeafe; color: #1e40af; padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto space-y-6">
        
        <header class="card bg-slate-900 text-white border-none shadow-xl flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <span class="text-2xl">🏥</span>
                <h1 class="text-xl font-black italic">MEDICAL LOCUS</h1>
            </div>
            <div class="flex flex-wrap justify-center gap-3">
                <input type="text" id="regionSearch" placeholder="지역명 검색 (예: 성동구)" onkeyup="filterRegions()" class="search-input">
                <select id="sidoSelect" onchange="updateSggOptions()" class="bg-slate-800 text-white border border-slate-700 px-3 py-2 rounded-lg text-sm outline-none">
                    <option value="">시/도</option>
                </select>
                <select id="sggSelect" onchange="updateDashboard()" class="bg-slate-800 text-white border border-slate-700 px-3 py-2 rounded-lg text-sm outline-none">
                    <option value="">시/군/구</option>
                </select>
                <select id="deptSelect" onchange="updateDashboard()" class="bg-blue-600 text-white border-none px-4 py-2 rounded-lg text-sm font-bold outline-none ring-2 ring-blue-400">
                    <option value="">진료과</option>
                </select>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-3 card p-2">
                <div id="map"></div>
            </div>
            <div class="space-y-4">
                <div class="card bg-gradient-to-br from-blue-600 to-indigo-700 text-white border-none">
                    <p class="text-[0.7rem] font-bold opacity-80 uppercase tracking-wider">Total Institutions</p>
                    <p id="clinic-count" class="text-5xl font-black mt-1">0</p>
                    <div id="dept-label" class="mt-3 text-xs font-medium bg-white/20 inline-block px-2 py-1 rounded">진료과 미선택</div>
                </div>
                <div class="card p-4">
                    <p class="text-xs font-bold text-slate-400 mb-1">평균 업력</p>
                    <p id="avg-duration" class="text-xl font-bold">-</p>
                </div>
                <div class="card p-4">
                    <p class="text-xs font-bold text-slate-400 mb-1">지역 주거 인구</p>
                    <p id="pop-count" class="text-xl font-bold">0명</p>
                </div>
            </div>
        </div>

        <section class="card">
            <div class="flex justify-between items-end mb-6">
                <h3 class="text-lg font-bold flex items-center gap-2">📊 <span id="bill-dept-title">선택 과목</span> 진료비 실적 <span class="text-xs font-normal text-slate-400">(의원급 전국 평균 기준)</span></h3>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-8 text-center">
                <div class="space-y-1">
                    <p class="text-xs text-slate-400 font-bold uppercase">청구건수</p>
                    <p id="bill-visits" class="text-xl font-bold">-</p>
                </div>
                <div class="space-y-1 border-x border-slate-100 px-4">
                    <p class="text-xs text-slate-400 font-bold uppercase">평균 진료비(계)</p>
                    <p id="bill-amt" class="text-xl font-bold text-blue-600">-</p>
                </div>
                <div class="space-y-1 pr-4 border-r border-slate-100">
                    <p class="text-xs text-slate-400 font-bold uppercase">최다 발생 질환</p>
                    <p id="bill-disease" class="text-sm font-bold text-slate-700">-</p>
                </div>
                <div class="space-y-1">
                    <p class="text-xs text-slate-400 font-bold uppercase">환자수 (추정)</p>
                    <p id="bill-patients" class="text-xl font-bold">42,777명</p>
                </div>
            </div>
        </section>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 pb-12">
            <div class="card flex flex-col">
                <h3 class="font-bold mb-4 border-b pb-2 flex justify-between">
                    <span>🏠 의료 인프라</span>
                    <span class="text-[10px] text-slate-400 font-normal">시군구 전체 기준</span>
                </h3>
                <ul id="other-inst-list" class="space-y-3 text-sm">
                    <p class="text-slate-300 text-center py-10 italic">지역을 선택하세요</p>
                </ul>
            </div>

            <div class="md:col-span-2 card p-0 overflow-hidden border-blue-100">
                <div class="bg-blue-50 px-6 py-4 border-b border-blue-100 flex justify-between items-center">
                    <h3 class="font-bold text-blue-900">📋 주요 의원 리스트 <span class="text-xs font-normal opacity-60 ml-2">업력순 TOP 5</span></h3>
                </div>
                <div id="clinic-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 p-6 max-h-[450px] overflow-y-auto">
                    <p class="text-slate-300 text-center py-20 col-span-2">지역과 진료과를 선택하여 분석을 시작하세요</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let db = null;
        let map = null;

        async function init() {
            try {
                const res = await fetch('national_full_data.json');
                db = await res.json();
                
                // 시도 및 진료과 셀렉트 박스 채우기
                populateSelect('sidoSelect', Object.keys(db.regions).sort());
                populateSelect('deptSelect', db.departments);
                
                map = new naver.maps.Map('map', {
                    center: new naver.maps.LatLng(37.5665, 126.9780),
                    zoom: 11
                });
            } catch (e) { console.error("Data Initialization Error", e); }
        }

        function populateSelect(id, list) {
            const el = document.getElementById(id);
            list.forEach(item => {
                const opt = document.createElement('option');
                opt.value = item; opt.innerText = item;
                el.appendChild(opt);
            });
        }

        function filterRegions() {
            const query = document.getElementById('regionSearch').value.toLowerCase();
            if (query.length < 2) return;
            
            // 전국의 시군구를 돌며 매칭되는 첫 번째 지역 자동 선택
            for (const sido in db.regions) {
                const foundSgg = db.regions[sido].find(sgg => sgg.toLowerCase().includes(query));
                if (foundSgg) {
                    document.getElementById('sidoSelect').value = sido;
                    updateSggOptions();
                    document.getElementById('sggSelect').value = foundSgg;
                    updateDashboard();
                    break;
                }
            }
        }

        function updateSggOptions() {
            const sido = document.getElementById('sidoSelect').value;
            const sggSelect = document.getElementById('sggSelect');
            sggSelect.innerHTML = '<option value="">시/군/구</option>';
            if (sido && db.regions[sido]) {
                db.regions[sido].forEach(sgg => {
                    const opt = document.createElement('option');
                    opt.value = sgg; opt.innerText = sgg;
                    sggSelect.appendChild(opt);
                });
            }
        }

        function updateDashboard() {
            const sido = document.getElementById('sidoSelect').value;
            const sgg = document.getElementById('sggSelect').value;
            const dept = document.getElementById('deptSelect').value;
            
            if (!sido || !sgg || !dept) return;

            const sggKey = `${sido} ${sgg}`;
            const sggInfo = db.sgg_data[sggKey];
            const deptInfo = (sggInfo && sggInfo.depts[dept]) ? sggInfo.depts[dept] : { count: 0, avg_duration: '-', clinics: [] };
            const billInfo = db.billing_by_dept[dept] || db.billing_by_dept['내과'];

            // 1. 요약 정보
            document.getElementById('clinic-count').innerText = deptInfo.count;
            document.getElementById('dept-label').innerText = dept;
            document.getElementById('avg-duration').innerText = deptInfo.avg_duration;
            document.getElementById('pop-count').innerText = sggInfo ? sggInfo.pop.toLocaleString() + "명" : "0명";

            // 2. 가변 진료비 실적 업데이트 (핵심 요청 사항)
            document.getElementById('bill-dept-title').innerText = dept;
            document.getElementById('bill-visits').innerText = billInfo.visits;
            document.getElementById('bill-amt').innerText = billInfo.billing_amt;
            document.getElementById('bill-disease').innerText = billInfo.top_disease;

            // 3. 인프라 정보
            const instList = document.getElementById('other-inst-list');
            if (sggInfo && sggInfo.other_inst) {
                instList.innerHTML = sggInfo.other_inst.map(i => `
                    <li class="flex justify-between items-center p-2 bg-slate-50 rounded-lg">
                        <span class="text-slate-500 font-medium">${i.label}</span>
                        <b class="text-slate-800">${i.value}개</b>
                    </li>
                `).join('');
            }

            // 4. 의원 리스트
            const listContainer = document.getElementById('clinic-list');
            if (deptInfo.clinics.length > 0) {
                listContainer.innerHTML = deptInfo.clinics.map((c, i) => `
                    <div class="p-4 border border-slate-100 rounded-xl bg-white shadow-sm hover:ring-2 hover:ring-blue-500 transition-all">
                        <div class="flex justify-between text-[10px] mb-2 font-bold">
                            <span class="text-blue-600">업력 ${c.duration}</span>
                            <span class="text-slate-300">개원일: ${c.openDate}</span>
                        </div>
                        <h4 class="font-bold text-sm mb-1 text-slate-800">${c.name}</h4>
                        <p class="text-[10px] text-slate-500 truncate">${c.address}</p>
                    </div>
                `).join('');
            } else {
                listContainer.innerHTML = `<p class="col-span-2 text-center py-20 text-slate-400">해당 지역에 ${dept} 의원이 없습니다.</p>`;
            }

            // 5. 지도 위치 이동
            naver.maps.Service.geocode({ query: sggKey }, (status, response) => {
                if (status === naver.maps.Service.Status.OK) {
                    const addr = response.v2.addresses[0];
                    const point = new naver.maps.LatLng(addr.y, addr.x);
                    map.setCenter(point);
                    map.setZoom(13);
                }
            });
        }

        window.onload = init;
    </script>
</body>
</html>
