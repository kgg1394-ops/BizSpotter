<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>MEDICAL LOCUS PRO - 전국 통합 분석 시스템</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://openapi.map.naver.com/openapi/v3/maps.js?ncpClientId=YOUR_CLIENT_ID&submodules=geocoding"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; background: #f3f4f6; color: #1e293b; }
        .card { background: white; border-radius: 1.5rem; padding: 1.5rem; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        select:focus, input:focus { box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.5); outline: none; }
        #map { width: 100%; height: 420px; border-radius: 1.5rem; border: 1px solid #d1d5db; }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-6 md:p-10">
    <div class="max-w-7xl mx-auto space-y-8">
        <header class="card bg-slate-900 text-white flex flex-wrap justify-between items-center gap-6 border-none shadow-2xl">
            <div class="flex items-center gap-3"><div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center font-black text-xl italic shadow-lg">M</div><h1 class="text-2xl font-black tracking-tighter uppercase">Medical Locus <span class="text-blue-500 font-medium text-sm ml-1">PRO</span></h1></div>
            <div class="flex flex-wrap gap-2">
                <input type="text" id="search" placeholder="지역명 검색 (예: 성동구)" onkeyup="searchRegion()" class="bg-slate-800 text-white rounded-xl px-4 py-2 text-sm border-none focus:bg-slate-700 w-48 transition-all">
                <select id="sido" onchange="updateSgg()" class="bg-slate-800 text-white rounded-xl px-4 py-2 text-sm border-none font-bold"><option value="">시/도 선택</option></select>
                <select id="sgg" onchange="render()" class="bg-slate-800 text-white rounded-xl px-4 py-2 text-sm border-none font-bold"><option value="">시/군/구 선택</option></select>
                <select id="dept" onchange="render()" class="bg-blue-600 text-white rounded-xl px-6 py-2 text-sm font-black border-none cursor-pointer ring-4 ring-blue-400/30 transition-all"><option value="">진료과 선택</option></select>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 card p-2 bg-slate-50"><div id="map"></div></div>
            <div class="space-y-6">
                <div class="card bg-gradient-to-br from-blue-600 to-blue-800 text-white border-none relative overflow-hidden shadow-xl">
                    <p class="text-[0.6rem] font-bold opacity-70 uppercase tracking-widest text-blue-100">Regional Institutions</p>
                    <div class="flex items-baseline gap-2 mt-2"><p id="count" class="text-7xl font-black tracking-tighter">0</p><span class="text-xl font-bold">개소</span></div>
                    <p id="dept-name" class="mt-4 text-xs font-bold bg-black/20 inline-block px-3 py-1 rounded-full">-</p>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="card p-5 text-center"><p class="text-[10px] text-slate-400 font-black uppercase mb-1">Avg Seniority</p><p id="duration" class="text-xl font-black text-slate-800">-</p></div>
                    <div class="card p-5 text-center"><p class="text-[10px] text-slate-400 font-black uppercase mb-1">Region Pop.</p><p id="pop" class="text-xl font-black text-slate-800">0</p></div>
                </div>
                <div class="card p-5 bg-slate-50 border-slate-200">
                    <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4 tracking-[0.2em]">Infrastructure</h3>
                    <ul id="infra-list" class="space-y-3 text-sm font-bold"><p class="text-slate-300 text-center py-4 italic text-xs">지역을 선택하십시오</p></ul>
                </div>
            </div>
        </div>

        <section class="card border-t-8 border-t-blue-500 shadow-2xl">
            <div class="flex justify-between items-center mb-8 border-b pb-6"><h2 class="text-lg font-black italic tracking-tight uppercase"><span class="text-blue-600">Region</span> Billing Analytics</h2></div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-10 text-center">
                <div><p class="text-[10px] text-slate-400 font-black mb-2 uppercase tracking-widest">Est. Visits</p><p id="v-visits" class="text-2xl font-black text-slate-800">-</p></div>
                <div class="border-x border-slate-100 px-4"><p class="text-[10px] text-slate-400 font-black mb-2 uppercase tracking-widest">Est. Revenue</p><p id="v-amt" class="text-2xl font-black text-blue-600">-</p></div>
                <div class="pr-4 border-r border-slate-100"><p class="text-[10px] text-slate-400 font-black mb-2 uppercase tracking-widest">Disease</p><p id="v-disease" class="text-sm font-black text-slate-700">-</p></div>
                <div><p class="text-[10px] text-slate-400 font-black mb-2 uppercase tracking-widest text-orange-500 font-bold">Est. Patients</p><p id="v-patients" class="text-2xl font-black text-orange-600">-</p></div>
            </div>
        </section>

        <section class="card p-0 overflow-hidden border-slate-200 shadow-xl">
            <div class="bg-slate-900 px-8 py-5 text-white flex justify-between items-center"><h3 class="font-black text-[0.7rem] uppercase tracking-[0.3em]">📋 Full Regional Clinic Directory</h3><span id="list-count" class="text-[10px] font-bold bg-blue-600 px-3 py-1 rounded-full">0개소</span></div>
            <div id="list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 p-10 max-h-[800px] overflow-y-auto custom-scroll bg-white"></div>
        </section>
    </div>

    <script>
        let db; let map;
        async function init() {
            try {
                const res = await fetch('national_full_data.json');
                db = await res.json();
                const sidoSelect = document.getElementById('sido');
                Object.keys(db.regions).sort().forEach(s => { const opt = document.createElement('option'); opt.value = s; opt.innerText = s; sidoSelect.appendChild(opt); });
                const deptSelect = document.getElementById('dept');
                db.departments.forEach(d => { const opt = document.createElement('option'); opt.value = d; opt.innerText = d; deptSelect.appendChild(opt); });
                map = new naver.maps.Map('map', { center: new naver.maps.LatLng(37.5665, 126.9780), zoom: 11 });
            } catch (e) { alert("데이터 로드 실패: Live Server를 사용하세요."); }
        }

        function updateSgg() {
            const s = document.getElementById('sido').value; const sggSelect = document.getElementById('sgg');
            sggSelect.innerHTML = '<option value="">시/군/구 선택</option>';
            if (s && db.regions[s]) db.regions[s].forEach(g => { const opt = document.createElement('option'); opt.value = g; opt.innerText = g; sggSelect.appendChild(opt); });
        }

        function render() {
            const si = document.getElementById('sido').value; const sg = document.getElementById('sgg').value; const de = document.getElementById('dept').value;
            if (!si || !sg || !de) return;
            const key = `${si} ${sg}`; const sggData = db.sgg_data[key];
            const deptData = (sggData && sggData.depts[de]) ? sggData.depts[de] : { count:0, est_patients:'0명', est_visits:'0건', est_revenue:'0원', avg_duration:'-', clinics:[] };

            document.getElementById('count').innerText = deptData.count; document.getElementById('dept-name').innerText = de;
            document.getElementById('duration').innerText = deptData.avg_duration; document.getElementById('pop').innerText = (sggData ? sggData.pop.toLocaleString() : "0") + "명";
            document.getElementById('v-visits').innerText = deptData.est_visits; document.getElementById('v-amt').innerText = deptData.est_revenue;
            document.getElementById('v-patients').innerText = deptData.est_patients; document.getElementById('v-disease').innerText = deptData.top_disease;
            document.getElementById('list-count').innerText = `${deptData.clinics.length}개소`;

            document.getElementById('list').innerHTML = deptData.clinics.map(c => `
                <div class="p-6 border border-slate-100 rounded-3xl hover:border-blue-400 hover:shadow-2xl transition-all bg-white group cursor-default">
                    <div class="flex justify-between mb-4 text-[0.6rem] font-black tracking-tighter uppercase text-slate-300"><span class="text-blue-600 bg-blue-50 px-2 py-1 rounded-lg">Seniority: ${c.duration}</span><span>${c.openDate}</span></div>
                    <p class="font-black text-slate-800 text-lg group-hover:text-blue-600 transition-colors leading-tight mb-2">${c.name}</p><p class="text-[0.7rem] text-slate-400 font-medium truncate">${c.address}</p>
                </div>
            `).join('') || '<p class="col-span-full text-center py-20 text-slate-300 font-black italic text-sm">데이터가 없습니다.</p>';

            document.getElementById('infra-list').innerHTML = (sggData && sggData.other_inst) ? sggData.other_inst.map(i => `
                <li class="flex justify-between items-center p-3 bg-white border border-slate-100 rounded-2xl shadow-sm"><span class="text-slate-500 uppercase text-[10px] tracking-tighter">${i.label}</span><span class="text-blue-600 font-black text-base">${i.value}개</span></li>
            `).join('') : '';

            naver.maps.Service.geocode({ query: key }, (status, response) => { if (status === naver.maps.Status.OK) { const addr = response.v2.addresses[0]; map.setCenter(new naver.maps.LatLng(addr.y, addr.x)); map.setZoom(13); } });
        }

        function searchRegion() {
            const q = document.getElementById('search').value; if (q.length < 2) return;
            for (const s in db.regions) { const found = db.regions[s].find(g => g.includes(q)); if (found) { document.getElementById('sido').value = s; updateSgg(); document.getElementById('sgg').value = found; render(); break; } }
        }
        window.onload = init;
    </script>
</body>
</html>
